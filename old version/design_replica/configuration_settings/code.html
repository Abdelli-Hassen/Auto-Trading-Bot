<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>System Settings &amp; Configuration</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for clinical feel */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0b1326; /* background color */
        }
        ::-webkit-scrollbar-thumb {
            background: #2d3449; /* surface-variant */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3e484f; /* outline-variant */
        }
    </style>
<!-- Tailwind CSS with custom configuration -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#2d3449",
                        "on-primary-container": "#004965",
                        "on-background": "#dae2fd",
                        "surface": "#0b1326",
                        "outline-variant": "#3e484f",
                        "on-secondary": "#003824",
                        "surface-container": "#171f33",
                        "tertiary-fixed-dim": "#ffb3ad",
                        "on-tertiary": "#68000a",
                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed": "#002113",
                        "outline": "#87929a",
                        "on-secondary-fixed-variant": "#005236",
                        "inverse-surface": "#dae2fd",
                        "surface-dim": "#0b1326",
                        "surface-container-highest": "#2d3449",
                        "on-surface-variant": "#bdc8d1",
                        "on-tertiary-fixed": "#410004",
                        "surface-container-low": "#131b2e",
                        "inverse-primary": "#00668a",
                        "secondary": "#4edea3",
                        "surface-container-lowest": "#060e20",
                        "secondary-fixed": "#6ffbbe",
                        "surface-container-high": "#222a3d",
                        "tertiary-fixed": "#ffdad7",
                        "on-tertiary-container": "#8d0012",
                        "surface-bright": "#31394d",
                        "secondary-container": "#00a572",
                        "on-primary": "#00354a",
                        "tertiary-container": "#ff938c",
                        "surface-tint": "#7bd0ff",
                        "on-surface": "#dae2fd",
                        "primary-fixed-dim": "#7bd0ff",
                        "background": "#0b1326",
                        "secondary-fixed-dim": "#4edea3",
                        "error-container": "#93000a",
                        "on-primary-fixed-variant": "#004c69",
                        "tertiary": "#ffbcb7",
                        "on-primary-fixed": "#001e2c",
                        "error": "#ffb4ab",
                        "primary-container": "#38bdf8",
                        "primary": "#8ed5ff",
                        "primary-fixed": "#c4e7ff",
                        "inverse-on-surface": "#283044",
                        "on-tertiary-fixed-variant": "#930013",
                        "on-error": "#690005",
                        "on-secondary-container": "#00311f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "md": "16px",
                        "lg": "24px",
                        "xs": "4px",
                        "unit": "4px",
                        "sm": "8px",
                        "gutter": "12px",
                        "xl": "40px",
                        "margin": "24px"
                    },
                    "fontFamily": {
                        "data-lg": ["JetBrains Mono", "monospace"],
                        "label-caps": ["Inter", "sans-serif"],
                        "body-md": ["Inter", "sans-serif"],
                        "display-xl": ["Inter", "sans-serif"],
                        "heading-lg": ["Inter", "sans-serif"],
                        "data-md": ["JetBrains Mono", "monospace"],
                        "data-sm": ["JetBrains Mono", "monospace"]
                    },
                    "fontSize": {
                        "data-lg": ["18px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "label-caps": ["11px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-xl": ["36px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],

                        "data-md": ["14px", { "lineHeight": "1.2", "fontWeight": "400" }],
                        "data-sm": ["12px", { "lineHeight": "1", "fontWeight": "400" }]

                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex font-body-md text-body-md overflow-hidden antialiased selection:bg-primary-container/30 selection:text-primary-container">
<!-- Configuration Settings UI -->
<div class="text-center py-12">
<h1 class="text-2xl font-bold text-on-surface">System Configuration</h1>
<p class="text-on-surface-variant">Design Replica - Configuration Settings</p>
</div>
